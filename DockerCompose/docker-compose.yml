services:
  app:
  #dockerfile bulan build . yapısı, Dockerfile'ın bulunduğu dizini belirtir. Bu durumda, Dockerfile'ın bulunduğu dizin geçerli dizindir (.). Docker Compose, bu dizinde Dockerfile'ı arayacak ve kullanarak görüntüyü oluşturacaktır.
    build: .
    volumes:
      - .:/django_app
    ports:
      - "8006:8006"
    image: app:django_app
    container_name: django_container 
    command: python manage.py runserver 0.0.0.0:8006